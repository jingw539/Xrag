version: '3.8'

services:
  opengauss:
    image: enmotech/opengauss:5.0.0
    container_name: chest-xray-db
    environment:
      GS_PASSWORD: ${GS_PASSWORD:?GS_PASSWORD is required}
      GS_DB: chest_xray_db
      GS_USERNAME: ${GS_USERNAME:-gaussdb}
    ports:
      - "5432:5432"
    volumes:
      - opengauss-data:/var/lib/opengauss
    networks:
      - chest-xray-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: chest-xray-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - chest-xray-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chest-xray-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: opengauss
      DB_PORT: 5432
      DB_NAME: chest_xray_db
      DB_USER: ${DB_USER:-gaussdb}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_USER: ${MINIO_USER:?MINIO_USER is required}
      MINIO_PASSWORD: ${MINIO_PASSWORD:?MINIO_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      QWEN_API_KEY: ${QWEN_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - opengauss
      - minio
    networks:
      - chest-xray-network
    restart: unless-stopped

volumes:
  opengauss-data:
    driver: local
  minio-data:
    driver: local

networks:
  chest-xray-network:
    driver: bridge