name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  BACKEND_DIR: backend
  JAR_NAME: chest-xray-backend-1.0.0.jar
  DOCKERHUB_NAMESPACE: wang861
  DOCKER_IMAGE_NAME: xrag-backend
  FRONTEND_DIR: frontend
  DOCKER_IMAGE_NAME_FRONTEND: xrag-frontend
  SERVER_HOST: 111.229.72.224
  SERVER_PORT: 22
  SERVER_USER: root
  REMOTE_CONTAINER_NAME: xrag-backend
  REMOTE_ENV_FILE: /opt/xrag/backend.env
  REMOTE_PORT: 8080
  REMOTE_CONTAINER_NAME_FRONTEND: xrag-frontend
  REMOTE_FRONTEND_PORT: 80
  REMOTE_FRONTEND_FALLBACK_PORT: 8081

jobs:
  code-checks:
    runs-on: ubuntu-latest
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Backend tests
        shell: bash
        run: |
          set -o pipefail
          mvn -f "$BACKEND_DIR/pom.xml" test -DskipTests=false -DskipITs 2>&1 | tee maven-test.log

      - name: Backend Checkstyle
        shell: bash
        run: |
          mvn -f "$BACKEND_DIR/pom.xml" -DskipTests=true checkstyle:check

      - name: Backend Spotless
        shell: bash
        run: |
          mvn -f "$BACKEND_DIR/pom.xml" -DskipTests=true spotless:check

      - name: Backend Dependency Check
        if: ${{ env.NVD_API_KEY != '' }}
        shell: bash
        run: |
          mvn -f "$BACKEND_DIR/pom.xml" -DskipTests=true dependency-check:check

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Frontend build
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm ci --no-audit --no-fund
          npm run lint
          npm run build

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: code-checks
    if: ${{ github.event_name != 'pull_request' }}
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend with Maven
        shell: bash
        run: |
          set -o pipefail
          mvn -f "$BACKEND_DIR/pom.xml" clean package -DskipTests 2>&1 | tee maven.log

      - name: Surface Maven error (if any)
        if: failure()
        shell: bash
        run: |
          echo "Maven build failed. Showing last 200 lines:" >> "$GITHUB_STEP_SUMMARY"
          if [ -f maven.log ]; then
            tail -n 200 maven.log >> "$GITHUB_STEP_SUMMARY"
          else
            echo "maven.log not found" >> "$GITHUB_STEP_SUMMARY"
          fi
          # Emit a compact annotation for API visibility
          if [ -f maven.log ]; then
            tail_msg="$(tail -n 30 maven.log | tr '\n' ' ' | sed 's/  */ /g')"
          else
            tail_msg="maven.log not found"
          fi
          tail_msg="${tail_msg//'%'/'%25'}"
          tail_msg="${tail_msg//$'\n'/'%0A'}"
          tail_msg="${tail_msg//$'\r'/'%0D'}"
          echo "::error::Maven build failed. Last lines: ${tail_msg}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          file: ${{ env.BACKEND_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client sshpass

      - name: Add SSH private key (if set)
        if: ${{ env.SSH_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy via SSH with key
        if: ${{ env.SSH_PRIVATE_KEY != '' }}
        run: |
          IMAGE_REPO="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME }}"
          IMAGE_TAG="${GITHUB_SHA}"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "old_image=\$(docker inspect -f '{{.Image}}' ${REMOTE_CONTAINER_NAME} 2>/dev/null || true) && \
             docker pull $IMAGE_REPO:$IMAGE_TAG && \
             (docker rm -f ${REMOTE_CONTAINER_NAME} >/dev/null 2>&1 || true) && \
             docker run -d --name ${REMOTE_CONTAINER_NAME} --restart unless-stopped \
             --network host --env-file ${REMOTE_ENV_FILE} $IMAGE_REPO:$IMAGE_TAG && \
             if [ -n \"\$old_image\" ]; then docker rmi -f \"\$old_image\" >/dev/null 2>&1 || true; fi && \
             docker image prune -f >/dev/null 2>&1 || true"

      - name: Deploy via SSH with password
        if: ${{ env.SSH_PRIVATE_KEY == '' && env.SERVER_PASSWORD != '' }}
        run: |
          IMAGE_REPO="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME }}"
          IMAGE_TAG="${GITHUB_SHA}"
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "old_image=\$(docker inspect -f '{{.Image}}' ${REMOTE_CONTAINER_NAME} 2>/dev/null || true) && \
             docker pull $IMAGE_REPO:$IMAGE_TAG && \
             (docker rm -f ${REMOTE_CONTAINER_NAME} >/dev/null 2>&1 || true) && \
             docker run -d --name ${REMOTE_CONTAINER_NAME} --restart unless-stopped \
             --network host --env-file ${REMOTE_ENV_FILE} $IMAGE_REPO:$IMAGE_TAG && \
             if [ -n \"\$old_image\" ]; then docker rmi -f \"\$old_image\" >/dev/null 2>&1 || true; fi && \
             docker image prune -f >/dev/null 2>&1 || true"

  frontend-build-and-deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: ${{ github.event_name != 'pull_request' }}
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_DIR }}
          file: ${{ env.FRONTEND_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME_FRONTEND }}:${{ github.sha }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME_FRONTEND }}:latest

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client sshpass

      - name: Add SSH private key (if set)
        if: ${{ env.SSH_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy frontend via SSH with key
        if: ${{ env.SSH_PRIVATE_KEY != '' }}
        shell: bash
        run: |
          set -o pipefail
          IMAGE_REPO="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME_FRONTEND }}"
          IMAGE_TAG="${GITHUB_SHA}"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "set -e; \
             old_image=\$(docker inspect -f '{{.Image}}' ${REMOTE_CONTAINER_NAME_FRONTEND} 2>/dev/null || true); \
             docker pull $IMAGE_REPO:$IMAGE_TAG; \
             (docker rm -f ${REMOTE_CONTAINER_NAME_FRONTEND} >/dev/null 2>&1 || true); \
             port_in_use=\$((command -v ss >/dev/null 2>&1 && ss -ltnp | grep -q ':80 ') || (command -v netstat >/dev/null 2>&1 && netstat -tlnp 2>/dev/null | grep -q ':80 '); echo \$?); \
             choose_port() { for p in ${REMOTE_FRONTEND_PORT} ${REMOTE_FRONTEND_FALLBACK_PORT} 8082 8083 8084 8085; do \
                 if (command -v ss >/dev/null 2>&1 && ! ss -ltn | awk '{print \$4}' | grep -q \":\$p\$\" ) || \
                    (command -v netstat >/dev/null 2>&1 && ! netstat -tln 2>/dev/null | awk '{print \$4}' | grep -q \":\$p\$\" ); then echo \$p; return; fi; \
               done; echo ${REMOTE_FRONTEND_FALLBACK_PORT}; }; \
             if [ \"\$port_in_use\" -ne 0 ]; then \
               docker run -d --name ${REMOTE_CONTAINER_NAME_FRONTEND} --restart unless-stopped \
               --add-host=host.docker.internal:host-gateway -p 80:80 $IMAGE_REPO:$IMAGE_TAG; \
               echo \"frontend running on port 80\"; \
             else \
               use_port=\$(choose_port); \
               docker run -d --name ${REMOTE_CONTAINER_NAME_FRONTEND} --restart unless-stopped \
               --add-host=host.docker.internal:host-gateway -p \"\$use_port\":80 $IMAGE_REPO:$IMAGE_TAG; \
               echo \"frontend running on port \$use_port\"; \
               if command -v nginx >/dev/null 2>&1; then \
                 cat >/etc/nginx/conf.d/xrag-frontend.conf <<'EOF'\nserver {\n  listen 80;\n  server_name _;\n  location / {\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto $scheme;\n    proxy_pass http://127.0.0.1:__FRONTEND_PORT__;\n  }\n}\nEOF\n; \
                 sed -i \"s/__FRONTEND_PORT__/\$use_port/g\" /etc/nginx/conf.d/xrag-frontend.conf; \
                 nginx -t && (systemctl reload nginx 2>/dev/null || nginx -s reload) || true; \
               fi; \
             fi; \
             if [ -n \"\$old_image\" ]; then docker rmi -f \"\$old_image\" >/dev/null 2>&1 || true; fi; \
             docker image prune -f >/dev/null 2>&1 || true" 2>&1 | tee frontend_deploy.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Deploy frontend via SSH with password
        if: ${{ env.SSH_PRIVATE_KEY == '' && env.SERVER_PASSWORD != '' }}
        shell: bash
        run: |
          set -o pipefail
          IMAGE_REPO="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKER_IMAGE_NAME_FRONTEND }}"
          IMAGE_TAG="${GITHUB_SHA}"
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "set -e; \
             old_image=\$(docker inspect -f '{{.Image}}' ${REMOTE_CONTAINER_NAME_FRONTEND} 2>/dev/null || true); \
             docker pull $IMAGE_REPO:$IMAGE_TAG; \
             (docker rm -f ${REMOTE_CONTAINER_NAME_FRONTEND} >/dev/null 2>&1 || true); \
             port_in_use=\$((command -v ss >/dev/null 2>&1 && ss -ltnp | grep -q ':80 ') || (command -v netstat >/dev/null 2>&1 && netstat -tlnp 2>/dev/null | grep -q ':80 '); echo \$?); \
             choose_port() { for p in ${REMOTE_FRONTEND_PORT} ${REMOTE_FRONTEND_FALLBACK_PORT} 8082 8083 8084 8085; do \
                 if (command -v ss >/dev/null 2>&1 && ! ss -ltn | awk '{print \$4}' | grep -q \":\$p\$\" ) || \
                    (command -v netstat >/dev/null 2>&1 && ! netstat -tln 2>/dev/null | awk '{print \$4}' | grep -q \":\$p\$\" ); then echo \$p; return; fi; \
               done; echo ${REMOTE_FRONTEND_FALLBACK_PORT}; }; \
             if [ \"\$port_in_use\" -ne 0 ]; then \
               docker run -d --name ${REMOTE_CONTAINER_NAME_FRONTEND} --restart unless-stopped \
               --add-host=host.docker.internal:host-gateway -p 80:80 $IMAGE_REPO:$IMAGE_TAG; \
               echo \"frontend running on port 80\"; \
             else \
               use_port=\$(choose_port); \
               docker run -d --name ${REMOTE_CONTAINER_NAME_FRONTEND} --restart unless-stopped \
               --add-host=host.docker.internal:host-gateway -p \"\$use_port\":80 $IMAGE_REPO:$IMAGE_TAG; \
               echo \"frontend running on port \$use_port\"; \
               if command -v nginx >/dev/null 2>&1; then \
                 cat >/etc/nginx/conf.d/xrag-frontend.conf <<'EOF'\nserver {\n  listen 80;\n  server_name _;\n  location / {\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto $scheme;\n    proxy_pass http://127.0.0.1:__FRONTEND_PORT__;\n  }\n}\nEOF\n; \
                 sed -i \"s/__FRONTEND_PORT__/\$use_port/g\" /etc/nginx/conf.d/xrag-frontend.conf; \
                 nginx -t && (systemctl reload nginx 2>/dev/null || nginx -s reload) || true; \
               fi; \
             fi; \
             if [ -n \"\$old_image\" ]; then docker rmi -f \"\$old_image\" >/dev/null 2>&1 || true; fi; \
             docker image prune -f >/dev/null 2>&1 || true" 2>&1 | tee frontend_deploy.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Surface frontend deploy log (if failed)
        if: failure()
        shell: bash
        run: |
          echo "Frontend deploy failed. Last 200 lines:" >> "$GITHUB_STEP_SUMMARY"
          if [ -f frontend_deploy.log ]; then
            tail -n 200 frontend_deploy.log >> "$GITHUB_STEP_SUMMARY"
          else
            echo "frontend_deploy.log not found" >> "$GITHUB_STEP_SUMMARY"
          fi
          tail_msg="$(tail -n 50 frontend_deploy.log 2>/dev/null | tr '\n' ' ' | sed 's/  */ /g')"
          if [ -z "$tail_msg" ]; then tail_msg="frontend_deploy.log not found or empty"; fi
          tail_msg="${tail_msg//'%'/'%25'}"
          tail_msg="${tail_msg//$'\n'/'%0A'}"
          tail_msg="${tail_msg//$'\r'/'%0D'}"
          echo "::error::Frontend deploy failed. ${tail_msg}"

      - name: Frontend smoke test (key)
        if: ${{ env.SSH_PRIVATE_KEY != '' }}
        run: |
          OUT=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "docker ps --filter name=${REMOTE_CONTAINER_NAME_FRONTEND} --format '{{.Names}} {{.Status}} {{.Ports}}' | head -n1; \
             if command -v curl >/dev/null 2>&1; then \
               code=\$(curl -I -m 5 -s -o /dev/null -w '%{http_code}' http://127.0.0.1/ || echo ERR); \
               echo \"localhost:80=\$code\"; \
             fi")
          OUT="${OUT//'%'/'%25'}"
          OUT="${OUT//$'\n'/'%0A'}"
          OUT="${OUT//$'\r'/'%0D'}"
          echo "::notice::FRONTEND_SMOKE ${OUT}"

      - name: Frontend smoke test (password)
        if: ${{ env.SSH_PRIVATE_KEY == '' && env.SERVER_PASSWORD != '' }}
        run: |
          OUT=$(sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "docker ps --filter name=${REMOTE_CONTAINER_NAME_FRONTEND} --format '{{.Names}} {{.Status}} {{.Ports}}' | head -n1; \
             if command -v curl >/dev/null 2>&1; then \
               code=\$(curl -I -m 5 -s -o /dev/null -w '%{http_code}' http://127.0.0.1/ || echo ERR); \
               echo \"localhost:80=\$code\"; \
             fi")
          OUT="${OUT//'%'/'%25'}"
          OUT="${OUT//$'\n'/'%0A'}"
          OUT="${OUT//$'\r'/'%0D'}"
          echo "::notice::FRONTEND_SMOKE ${OUT}"
