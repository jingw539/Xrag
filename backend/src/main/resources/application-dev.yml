spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chest_xray_db}
    username: ${DB_USER:gaussdb}
    password: ${DB_PASSWORD:xrag-dev-db-password-change-me}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_USER:xrag-dev-minio}
  secret-key: ${MINIO_PASSWORD:xrag-dev-minio-password-change-me}
  bucket-name: cxr-images

jwt:
  secret: ${JWT_SECRET:xrag-dev-jwt-secret-key-change-me-please-32chars}
  expiration: 7200
  refresh-expiration: 604800

app:
  security:
    expose-docs: true
    expose-actuator: true
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,http://localhost,http://127.0.0.1}

ai:
  local:
    base-url: ${AI_LOCAL_BASE_URL:}
    timeout: ${AI_LOCAL_TIMEOUT:120000}
  qwen:
    api-key: ${QWEN_API_KEY:YOUR_QWEN_API_KEY_HERE}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-vl-plus
    timeout: 120000
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:YOUR_DEEPSEEK_API_KEY_HERE}
    base-url: https://api.deepseek.com
    timeout: 60000

rag:
  base-url: ${RAG_BASE_URL:}
  timeout: ${RAG_TIMEOUT:8000}
logging:
  level:
    com.hospital.xray: DEBUG

# Knife4j 閰嶇疆
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 瀹炰綋绫诲垪琛?

# SpringDoc 閰嶇疆
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 用户认证
      paths-to-match: /api/auth/**
    - group: 用户管理
      paths-to-match: /api/users/**
    - group: 病例管理
      paths-to-match: /api/cases/**
    - group: 影像管理
      paths-to-match: /api/images/**
    - group: RAG 检索
      paths-to-match: /api/retrieval/**
    - group: 报告管理
      paths-to-match: /api/reports/**
    - group: 术语规范化
      paths-to-match: /api/terms/**
    - group: 质控统计
      paths-to-match: /api/statistics/**
    - group: 系统配置
      paths-to-match: /api/config/**
    - group: 数据字典
      paths-to-match: /api/dict/**
    - group: 操作日志
      paths-to-match: /api/logs/**

