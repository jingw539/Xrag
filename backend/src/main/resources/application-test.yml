spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

minio:
  enabled: false
  endpoint: http://localhost:9000
  access-key: test-minio
  secret-key: test-minio-secret
  bucket-name: cxr-images

app:
  security:
    expose-docs: false
    expose-actuator: false

jwt:
  secret: test-jwt-secret-key-32-chars-min
  expiration: 7200
  refresh-expiration: 604800

ai:
  qwen:
    api-key: test-dummy
    base-url: http://localhost
    model: qwen-vl-plus
    timeout: 120000
  deepseek:
    api-key: test-dummy
    base-url: http://localhost
    timeout: 60000

rag:
  base-url: ${RAG_BASE_URL:}
  timeout: ${RAG_TIMEOUT:8000}

logging:
  level:
    com.hospital.xray: WARN
